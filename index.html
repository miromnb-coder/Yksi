<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Arrow HUD</title>
  <style>
    :root{
      --bg:#020203;
      --glass:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.96);
      --muted:rgba(255,255,255,.56);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 28%, rgba(255,255,255,.09), transparent 24%),
        radial-gradient(circle at 50% 52%, rgba(255,255,255,.04), transparent 48%),
        linear-gradient(180deg, #09090d, var(--bg));
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      position: fixed;
      inset: 0;
      padding: 14px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    #top {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #dest {
      flex: 1;
      min-height: 52px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--glass);
      color: var(--text);
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      backdrop-filter: blur(18px);
      box-sizing: border-box;
    }

    #dest::placeholder {
      color: rgba(255,255,255,.42);
    }

    .btn {
      min-width: 58px;
      min-height: 52px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.10);
      color: var(--text);
      font-weight: 700;
      font-size: 14px;
      backdrop-filter: blur(18px);
    }

    #center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      transition: opacity 240ms ease;
      pointer-events: none;
      text-align: center;
    }

    #center.show {
      opacity: 1;
    }

    .ring {
      width: 144px;
      height: 144px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;
      border: 1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(circle at center, rgba(255,255,255,.11), rgba(255,255,255,.03) 42%, transparent 68%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        0 0 44px rgba(255,255,255,.06);
      overflow: hidden;
    }

    .ring::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,.14);
      opacity: .45;
      animation: spin 18s linear infinite;
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle at center, transparent 48%, rgba(255,255,255,.10) 49%, transparent 51%);
      opacity: .5;
      animation: breathe 3.2s ease-in-out infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes breathe {
      0%,100% { transform: scale(.82); opacity: .42; }
      50% { transform: scale(.90); opacity: .72; }
    }

    .arrowWrap {
      width: 86px;
      height: 86px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 2;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.16);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 14px 28px rgba(0,0,0,.24);
      transition: transform 180ms ease;
      will-change: transform;
    }

    .arrowSvg {
      width: 52px;
      height: 52px;
      transform-origin: 50% 50%;
      transform: rotate(0deg);
      transition: transform 220ms cubic-bezier(.2,.8,.2,1);
      filter: drop-shadow(0 0 10px rgba(255,255,255,.10));
    }

    #distance {
      min-width: 120px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      font-size: 18px;
      backdrop-filter: blur(18px);
    }

    #sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.35px;
      text-transform: uppercase;
    }

    #bottom {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .chip {
      flex: 1;
      min-width: 0;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      backdrop-filter: blur(18px);
    }

    #hint {
      position: absolute;
      left: 50%;
      bottom: 118px;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--line);
      color: rgba(255,255,255,0.74);
      font-size: 12px;
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    #hint.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="top">
      <input id="dest" placeholder="Kirjoita kohde, esim. Kamppi Helsinki" />
      <button class="btn" id="go">Aloita</button>
      <button class="btn" id="mic">Mikki</button>
    </div>

    <div id="center">
      <div class="ring">
        <div class="arrowWrap" id="arrowWrap">
          <svg class="arrowSvg" id="arrowSvg" viewBox="0 0 100 100" aria-hidden="true">
            <path d="M50 14 L50 70" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
            <path d="M28 36 L50 14 L72 36" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div id="distance">—</div>
      <div id="sub">Valmis</div>
    </div>

    <div id="hint">Sano esimerkiksi: “Vie Kamppiin”, “Lopeta”, “Missä olen”, “Kuinka pitkä matka”</div>

    <div id="bottom">
      <div class="chip" id="gps">Sijainti: pois</div>
      <div class="chip" id="compass">Kompassi: pois</div>
      <div class="chip" id="mode">Tila: Valmis</div>
    </div>
  </div>

  <script>
    const center = document.getElementById('center');
    const arrowSvg = document.getElementById('arrowSvg');
    const arrowWrap = document.getElementById('arrowWrap');
    const distanceEl = document.getElementById('distance');
    const sub = document.getElementById('sub');
    const gps = document.getElementById('gps');
    const compass = document.getElementById('compass');
    const mode = document.getElementById('mode');
    const hint = document.getElementById('hint');
    const dest = document.getElementById('dest');
    const goBtn = document.getElementById('go');
    const micBtn = document.getElementById('mic');

    const state = {
      current: null,
      target: null,
      watchId: null,
      heading: null,
      lastVibeAt: 0,
      listening: false,
      recognition: null,
      voicesReady: false,
      finnishVoice: null,
      compassEnabled: false
    };

    function showHint(text) {
      hint.textContent = text;
      hint.classList.add('show');
      clearTimeout(showHint.t);
      showHint.t = setTimeout(() => hint.classList.remove('show'), 1500);
    }

    function setMode(text) {
      mode.textContent = `Tila: ${text}`;
    }

    function speak(text) {
      try {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();

        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'fi-FI';
        u.rate = 1.0;
        u.pitch = 1.0;
        u.volume = 1.0;

        const voices = window.speechSynthesis.getVoices();
        const fiVoice =
          state.finnishVoice ||
          voices.find(v => /^fi\b/i.test(v.lang)) ||
          voices.find(v => /finnish/i.test(v.name)) ||
          null;

        if (fiVoice) u.voice = fiVoice;

        window.speechSynthesis.speak(u);
      } catch (e) {}
    }

    function loadVoices() {
      if (!('speechSynthesis' in window)) return;
      const voices = window.speechSynthesis.getVoices();
      state.finnishVoice =
        voices.find(v => /^fi\b/i.test(v.lang)) ||
        voices.find(v => /finnish/i.test(v.name)) ||
        null;
      state.voicesReady = true;
    }

    if ('speechSynthesis' in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    function toRad(v) { return v * Math.PI / 180; }
    function toDeg(v) { return v * 180 / Math.PI; }

    function haversine(a, b) {
      const R = 6371000;
      const dLat = toRad(b.lat - a.lat);
      const dLon = toRad(b.lng - a.lng);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(x));
    }

    function bearing(from, to) {
      const φ1 = toRad(from.lat), φ2 = toRad(to.lat);
      const λ1 = toRad(from.lng), λ2 = toRad(to.lng);
      const y = Math.sin(λ2 - λ1) * Math.cos(φ2);
      const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(λ2 - λ1);
      return (toDeg(Math.atan2(y, x)) + 360) % 360;
    }

    function diffAngle(a, b) {
      let d = ((a - b) % 360 + 360) % 360;
      if (d > 180) d -= 360;
      return d;
    }

    function formatDistance(m) {
      if (m == null || Number.isNaN(m)) return '—';
      if (m < 1000) return `${Math.round(m)} m`;
      return `${(m / 1000).toFixed(m < 10000 ? 1 : 0)} km`;
    }

    function arrowRotationFromDiff(d) {
      if (Math.abs(d) < 10) return 0;
      if (d >= 10 && d < 40) return 30;
      if (d >= 40 && d < 85) return 90;
      if (d >= 85 && d < 140) return 135;
      if (d >= 140) return 180;
      if (d <= -10 && d > -40) return -30;
      if (d <= -40 && d > -85) return -90;
      if (d <= -85 && d > -140) return -135;
      if (d <= -140) return 180;
      return 0;
    }

    function normalizeText(t) {
      return t
        .toLowerCase()
        .replace(/[.,!?]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function normalizeDestinationText(text) {
      const t = normalizeText(text);

      const map = [
        [/kamppiin|kampissa|kamppi\b/i, 'Kamppi Helsinki'],
        [/helsinkiin|helsingissä|helsinki\b/i, 'Helsinki'],
        [/espooseen|espoossa|espoo\b/i, 'Espoo'],
        [/tampereelle|tampereella|tampere\b/i, 'Tampere'],
        [/turkuun|turussa|turku\b/i, 'Turku'],
        [/jyväskylään|jyväskylässä|jyväskylä\b/i, 'Jyväskylä'],
        [/ouluun|oulussa|oulu\b/i, 'Oulu'],
        [/rovaniemelle|rovaniemellä|rovaniemi\b/i, 'Rovaniemi']
      ];

      for (const [rx, value] of map) {
        if (rx.test(t)) return value;
      }

      return text.trim();
    }

    function extractDestinationFromCommand(text) {
      const t = normalizeText(text);

      const patterns = [
        /^(?:vie|navigoi|ohjaa|mene|mennään|aloita|etsi)\s+(?:kohteeseen\s+|paikkaan\s+|osoitteeseen\s+)?(.+)$/i,
        /^(?:sano|avaa)\s+(?:kohteeksi\s+)?(.+)$/i
      ];

      for (const rx of patterns) {
        const m = t.match(rx);
        if (m && m[1]) {
          return normalizeDestinationText(m[1]);
        }
      }

      return '';
    }

    async function geocode(q) {
      const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(q)}&limit=1`;
      const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
      const data = await res.json();
      if (!data.length) throw new Error('Ei löytynyt');
      return {
        lat: parseFloat(data[0].lat),
        lng: parseFloat(data[0].lon),
        label: data[0].display_name || q
      };
    }

    async function enableCompass() {
      try {
        if (state.compassEnabled) return true;

        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== "granted") {
            compass.textContent = 'Kompassi: kieltytty';
            speak('Kompassin lupa evättiin');
            return false;
          }
        }

        window.addEventListener("deviceorientation", (e) => {
          if (typeof e.webkitCompassHeading === "number") {
            state.heading = e.webkitCompassHeading;
          } else if (e.alpha != null) {
            state.heading = 360 - e.alpha;
          }
        }, true);

        state.compassEnabled = true;
        compass.textContent = 'Kompassi: päällä';
        return true;
      } catch (e) {
        compass.textContent = 'Kompassi: pois';
        return false;
      }
    }

    function updateHUD() {
      if (!state.current || !state.target) return;

      const d = haversine(state.current, state.target);
      const b = bearing(state.current, state.target);
      const h = state.heading;

      let diff = 0;
      if (h != null) diff = diffAngle(b, h);

      const rot = arrowRotationFromDiff(diff);
      arrowSvg.style.transform = `rotate(${rot}deg)`;

      distanceEl.textContent = d < 20 ? 'NYT' : formatDistance(d);
      sub.textContent = d < 20 ? 'Perillä pian' : 'Navigoi';
      gps.textContent = 'Sijainti: päällä';

      const show = d < 120 || Math.abs(diff) > 18 || state.listening;
      center.classList.toggle('show', show);

      if (d < 20 && Date.now() - state.lastVibeAt > 1200) {
        if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
        state.lastVibeAt = Date.now();
      }

      arrowWrap.style.transform = d < 20 ? 'scale(1.06)' : 'scale(1)';
    }

    async function startNavigation(rawInput) {
      const q = (rawInput || dest.value || '').trim();
      if (!q) {
        showHint('Kirjoita kohde ensin');
        speak('Kirjoita kohde ensin');
        return;
      }

      const compassOk = await enableCompass();
      if (!compassOk) {
        showHint('Kompassin lupa puuttuu');
      }

      setMode('Navigointi');
      showHint('Haetaan kohde');
      speak(`Haetaan kohde ${q}`);

      const target = await geocode(q);
      state.target = target;

      if (!navigator.geolocation) {
        showHint('Sijaintia ei tueta');
        speak('Sijaintia ei tueta tässä selaimessa');
        return;
      }

      if (state.watchId) navigator.geolocation.clearWatch(state.watchId);

      navigator.geolocation.getCurrentPosition((pos) => {
        state.current = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy
        };
        gps.textContent = 'Sijainti: päällä';
        updateHUD();
        speak(`Navigointi aloitettu kohteeseen ${q}`);
      }, () => {
        gps.textContent = 'Sijainti: pois';
        showHint('Sijaintilupa puuttuu');
        speak('Sijaintilupa puuttuu');
      }, {
        enableHighAccuracy: true,
        timeout: 12000,
        maximumAge: 0
      });

      state.watchId = navigator.geolocation.watchPosition((pos) => {
        state.current = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy
        };
        gps.textContent = 'Sijainti: päällä';
        updateHUD();
      }, () => {}, {
        enableHighAccuracy: true,
        maximumAge: 1000,
        timeout: 10000
      });
    }

    function stopNavigation() {
      if (state.watchId) {
        navigator.geolocation.clearWatch(state.watchId);
        state.watchId = null;
      }
      state.target = null;
      state.listening = false;
      micBtn.textContent = 'Mikki';
      gps.textContent = 'Sijainti: pois';
      setMode('Valmis');
      center.classList.remove('show');
      showHint('Pysäytetty');
      speak('Navigointi pysäytetty');
    }

    function repeatStatus() {
      if (!state.current || !state.target) {
        speak('Ei aktiivista navigointia');
        return;
      }
      const d = haversine(state.current, state.target);
      if (d < 20) {
        speak('Olet perillä');
      } else {
        speak(`Matkaa on noin ${formatDistance(d)}`);
      }
    }

    function whereAmI() {
      if (!state.current) {
        speak('Sijaintia ei vielä ole');
        return;
      }
      speak(`Sijaintisi tarkkuus on noin ${Math.round(state.current.accuracy || 0)} metriä`);
    }

    function helpCommand() {
      speak('Voit sanoa: vie Kamppiin, lopeta, missä olen, kuinka pitkä matka, toista');
    }

    function parseCommand(text) {
      const t = normalizeText(text);

      if (t.includes('lopeta') || t.includes('pysäytä') || t.includes('pysayta') || t.includes('seis')) {
        stopNavigation();
        return;
      }

      if (t.includes('missä olen') || t.includes('missä mä oon') || t.includes('sijainti') || t.includes('missä olen nyt')) {
        whereAmI();
        return;
      }

      if (t.includes('kuinka pitkä matka') || t.includes('kuinka pitkä') || t.includes('paljonko matkaa') || t.includes('matka') || t.includes('jäljellä')) {
        repeatStatus();
        return;
      }

      if (t.includes('toista') || t.includes('uudestaan') || t.includes('repeat')) {
        repeatStatus();
        return;
      }

      if (t.includes('apu') || t.includes('mitä voin sanoa') || t.includes('ohje')) {
        helpCommand();
        return;
      }

      const place = extractDestinationFromCommand(t);
      if (place) {
        dest.value = place;
        startNavigation(place);
        return;
      }

      speak('En ymmärtänyt komentoa');
      showHint('Komento ei mennyt perille');
    }

    function startVoice() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        showHint('Puheentunnistus ei ole käytössä');
        speak('Tämä selain ei tue puheentunnistusta');
        return;
      }

      if (state.recognition && state.listening) {
        state.listening = false;
        micBtn.textContent = 'Mikki';
        setMode(state.target ? 'Navigointi' : 'Valmis');
        try { state.recognition.stop(); } catch (e) {}
        return;
      }

      const recognition = new SpeechRecognition();
      state.recognition = recognition;
      recognition.lang = 'fi-FI';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        state.listening = true;
        micBtn.textContent = 'Kuuntelen';
        setMode('Kuuntelen');
        showHint('Kuuntelen');
        speak('Kuuntelen');
        center.classList.add('show');
      };

      recognition.onend = () => {
        state.listening = false;
        micBtn.textContent = 'Mikki';
        setMode(state.target ? 'Navigointi' : 'Valmis');
        if (!state.target) {
          center.classList.remove('show');
        }
      };

      recognition.onerror = (e) => {
        state.listening = false;
        micBtn.textContent = 'Mikki';
        setMode(state.target ? 'Navigointi' : 'Valmis');
        showHint('Ääni ei onnistunut');
        if (e && e.error) {
          speak('Puheentunnistus epäonnistui');
        }
      };

      recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript || '';
        showHint(transcript);
        parseCommand(transcript);
      };

      try {
        recognition.start();
      } catch (e) {
        showHint('Puhe ei käynnistynyt');
      }
    }

    goBtn.onclick = () => {
      startNavigation(dest.value).catch(err => {
        console.error(err);
        showHint('Virhe');
        speak('Virhe');
      });
    };

    micBtn.onclick = () => {
      startVoice();
    };

    dest.value = 'Kamppi Helsinki';
    setMode('Valmis');
    showHint('Sano esimerkiksi: “Vie Kamppiin”');

    let sx = 0, sy = 0, tracking = false;
    document.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      sx = t.clientX;
      sy = t.clientY;
      tracking = true;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      if (!tracking) return;
      tracking = false;
      const t = e.changedTouches[0];
      const dx = t.clientX - sx;
      const dy = t.clientY - sy;

      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 35) {
        const newMode = dx > 0 ? 'Kartta' : 'HUD';
        setMode(newMode);
        showHint(newMode === 'Kartta' ? 'Kartta-tila' : 'HUD-tila');
      }
    }, { passive: true });

    document.body.addEventListener('click', () => {
      enableCompass();
    }, { once: true });
  </script>
</body>
</html>
