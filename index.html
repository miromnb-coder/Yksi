<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Halo HUD</title>
  <style>
    :root{
      --bg:#020203;
      --glass:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.96);
      --muted:rgba(255,255,255,.56);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 28%, rgba(255,255,255,.09), transparent 24%),
        radial-gradient(circle at 50% 52%, rgba(255,255,255,.04), transparent 48%),
        linear-gradient(180deg, #09090d, var(--bg));
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      position: fixed;
      inset: 0;
      padding: 14px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    #top {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #dest {
      flex: 1;
      min-height: 52px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--glass);
      color: var(--text);
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      backdrop-filter: blur(18px);
      box-sizing: border-box;
    }

    #go {
      min-width: 58px;
      min-height: 52px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.10);
      color: var(--text);
      font-weight: 700;
      font-size: 14px;
      backdrop-filter: blur(18px);
    }

    #center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      transition: opacity 240ms ease;
      pointer-events: none;
      text-align: center;
    }

    #center.show {
      opacity: 1;
    }

    .ring {
      width: 144px;
      height: 144px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;
      border: 1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(circle at center, rgba(255,255,255,.11), rgba(255,255,255,.03) 42%, transparent 68%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        0 0 44px rgba(255,255,255,.06);
      overflow: hidden;
    }

    .ring::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,.14);
      opacity: .45;
      animation: spin 18s linear infinite;
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle at center, transparent 48%, rgba(255,255,255,.10) 49%, transparent 51%);
      opacity: .5;
      animation: breathe 3.2s ease-in-out infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes breathe {
      0%,100% { transform: scale(.82); opacity: .42; }
      50% { transform: scale(.90); opacity: .72; }
    }

    .arrowWrap {
      width: 86px;
      height: 86px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 2;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.16);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 14px 28px rgba(0,0,0,.24);
      transition: transform 180ms ease;
      will-change: transform;
    }

    .arrowSvg {
      width: 52px;
      height: 52px;
      transform-origin: 50% 50%;
      transform: rotate(0deg);
      transition: transform 220ms cubic-bezier(.2,.8,.2,1);
      filter: drop-shadow(0 0 10px rgba(255,255,255,.10));
    }

    #distance {
      min-width: 120px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      font-size: 18px;
      backdrop-filter: blur(18px);
    }

    #sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.35px;
      text-transform: uppercase;
    }

    #bottom {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .chip {
      flex: 1;
      min-width: 0;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      backdrop-filter: blur(18px);
    }

    #hint {
      position: absolute;
      left: 50%;
      bottom: 118px;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--line);
      color: rgba(255,255,255,0.74);
      font-size: 12px;
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    #hint.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="top">
      <input id="dest" placeholder="Kirjoita kohde, esim. Kamppi Helsinki" />
      <button id="go">Go</button>
    </div>

    <div id="center">
      <div class="ring">
        <div class="arrowWrap" id="arrowWrap">
          <svg class="arrowSvg" id="arrowSvg" viewBox="0 0 100 100" aria-hidden="true">
            <path d="M50 14 L50 70" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
            <path d="M28 36 L50 14 L72 36" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div id="distance">—</div>
      <div id="sub">Ready</div>
    </div>

    <div id="hint">Swipe vasen/oikea vaihtaa tilaa</div>

    <div id="bottom">
      <div class="chip" id="gps">GPS: off</div>
      <div class="chip" id="mode">Mode: HUD</div>
      <div class="chip" id="acc">Acc: —</div>
    </div>
  </div>

  <script>
    const center = document.getElementById('center');
    const arrowSvg = document.getElementById('arrowSvg');
    const arrowWrap = document.getElementById('arrowWrap');
    const distanceEl = document.getElementById('distance');
    const sub = document.getElementById('sub');
    const gps = document.getElementById('gps');
    const mode = document.getElementById('mode');
    const acc = document.getElementById('acc');
    const hint = document.getElementById('hint');
    const dest = document.getElementById('dest');

    const state = {
      current: null,
      target: null,
      watchId: null,
      heading: null,
      mode: 'HUD',
      lastVibeAt: 0
    };

    function showHint(text) {
      hint.textContent = text;
      hint.classList.add('show');
      clearTimeout(showHint.t);
      showHint.t = setTimeout(() => hint.classList.remove('show'), 1300);
    }

    function toRad(v) { return v * Math.PI / 180; }
    function toDeg(v) { return v * 180 / Math.PI; }

    function haversine(a, b) {
      const R = 6371000;
      const dLat = toRad(b.lat - a.lat);
      const dLon = toRad(b.lng - a.lng);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(x));
    }

    function bearing(from, to) {
      const φ1 = toRad(from.lat), φ2 = toRad(to.lat);
      const λ1 = toRad(from.lng), λ2 = toRad(to.lng);
      const y = Math.sin(λ2 - λ1) * Math.cos(φ2);
      const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(λ2 - λ1);
      return (toDeg(Math.atan2(y, x)) + 360) % 360;
    }

    function diffAngle(a, b) {
      let d = ((a - b) % 360 + 360) % 360;
      if (d > 180) d -= 360;
      return d;
    }

    function formatDistance(m) {
      if (m == null || Number.isNaN(m)) return '—';
      if (m < 1000) return `${Math.round(m)} m`;
      return `${(m / 1000).toFixed(m < 10000 ? 1 : 0)} km`;
    }

    function arrowRotationFromDiff(d) {
      if (Math.abs(d) < 10) return 0;
      if (d >= 10 && d < 40) return 30;
      if (d >= 40 && d < 85) return 90;
      if (d >= 85 && d < 140) return 135;
      if (d >= 140) return 180;
      if (d <= -10 && d > -40) return -30;
      if (d <= -40 && d > -85) return -90;
      if (d <= -85 && d > -140) return -135;
      if (d <= -140) return 180;
      return 0;
    }

    async function geocode(q) {
      const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(q)}&limit=1`;
      const res = await fetch(url);
      const data = await res.json();
      if (!data.length) throw new Error('Ei löytynyt');
      return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
    }

    async function enableCompass() {
      if (typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function") {
        const permission = await DeviceOrientationEvent.requestPermission();
        if (permission !== "granted") return;
      }

      window.addEventListener("deviceorientation", (e) => {
        if (typeof e.webkitCompassHeading === "number") {
          state.heading = e.webkitCompassHeading;
        } else if (e.alpha != null) {
          state.heading = 360 - e.alpha;
        }
      }, true);
    }

    function updateHUD() {
      if (!state.current || !state.target) return;

      const d = haversine(state.current, state.target);
      const b = bearing(state.current, state.target);
      const h = state.heading;

      let diff = 0;
      if (h != null) diff = diffAngle(b, h);

      const rot = arrowRotationFromDiff(diff);
      arrowSvg.style.transform = `rotate(${rot}deg)`;

      distanceEl.textContent = d < 20 ? 'NOW' : formatDistance(d);
      sub.textContent = d < 20 ? 'Arrived soon' : 'Navigate';
      gps.textContent = 'GPS: on';
      acc.textContent = state.current.accuracy ? `Acc: ±${Math.round(state.current.accuracy)}m` : 'Acc: —';

      const show = d < 120 || Math.abs(diff) > 18;
      center.classList.toggle('show', show || state.mode === 'DEBUG');

      if (d < 20 && Date.now() - state.lastVibeAt > 1200) {
        if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
        state.lastVibeAt = Date.now();
      }

      if (d < 20) {
        arrowWrap.style.transform = 'scale(1.06)';
      } else {
        arrowWrap.style.transform = 'scale(1)';
      }
    }

    async function start() {
      const q = dest.value.trim();
      if (!q) {
        showHint('Kirjoita kohde ensin');
        return;
      }

      showHint('Haetaan sijainti…');
      await enableCompass();

      state.target = await geocode(q);

      if (!navigator.geolocation) {
        showHint('GPS ei ole käytössä');
        return;
      }

      navigator.geolocation.getCurrentPosition((pos) => {
        state.current = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy
        };
        gps.textContent = 'GPS: on';
        updateHUD();
      }, () => {
        gps.textContent = 'GPS: off';
        showHint('Sijaintilupa puuttuu');
      }, {
        enableHighAccuracy: true,
        timeout: 12000,
        maximumAge: 0
      });

      if (state.watchId) navigator.geolocation.clearWatch(state.watchId);
      state.watchId = navigator.geolocation.watchPosition((pos) => {
        state.current = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy
        };
        gps.textContent = 'GPS: on';
        updateHUD();
      }, () => {}, {
        enableHighAccuracy: true,
        maximumAge: 1000,
        timeout: 10000
      });
    }

    document.getElementById('go').onclick = () => {
      start().catch(err => {
        console.error(err);
        showHint('Virhe');
      });
    };

    dest.value = 'Kamppi Helsinki';

    let sx = 0, sy = 0, tracking = false;
    document.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      sx = t.clientX;
      sy = t.clientY;
      tracking = true;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      if (!tracking) return;
      tracking = false;
      const t = e.changedTouches[0];
      const dx = t.clientX - sx;
      const dy = t.clientY - sy;

      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 35) {
        state.mode = dx > 0 ? 'MAP' : 'HUD';
        mode.textContent = `Mode: ${state.mode}`;
        showHint(state.mode === 'MAP' ? 'Map mode' : 'HUD mode');
      }
    }, { passive: true });

    document.body.addEventListener('click', () => {
      enableCompass();
    }, { once: true });

    showHint('Ready');
  </script>
</body>
</html>
