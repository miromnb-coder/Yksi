<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Halo AI</title>
  <style>
    :root{
      --bg:#020203;
      --glass:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.96);
      --muted:rgba(255,255,255,.56);
      --ok:rgba(255,255,255,.92);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 28%, rgba(255,255,255,.09), transparent 24%),
        radial-gradient(circle at 50% 52%, rgba(255,255,255,.04), transparent 48%),
        linear-gradient(180deg, #09090d, var(--bg));
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      position: fixed;
      inset: 0;
      padding: 14px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    #top {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #dest {
      flex: 1;
      min-height: 52px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--glass);
      color: var(--text);
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      backdrop-filter: blur(18px);
      box-sizing: border-box;
    }

    #dest::placeholder {
      color: rgba(255,255,255,.42);
    }

    .btn {
      min-width: 58px;
      min-height: 52px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.10);
      color: var(--text);
      font-weight: 700;
      font-size: 14px;
      backdrop-filter: blur(18px);
    }

    #center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      transition: opacity 240ms ease;
      pointer-events: none;
      text-align: center;
    }

    #center.show {
      opacity: 1;
    }

    .ring {
      width: 144px;
      height: 144px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;
      border: 1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(circle at center, rgba(255,255,255,.11), rgba(255,255,255,.03) 42%, transparent 68%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        0 0 44px rgba(255,255,255,.06);
      overflow: hidden;
    }

    .ring::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,.14);
      opacity: .45;
      animation: spin 18s linear infinite;
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle at center, transparent 48%, rgba(255,255,255,.10) 49%, transparent 51%);
      opacity: .5;
      animation: breathe 3.2s ease-in-out infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes breathe {
      0%,100% { transform: scale(.82); opacity: .42; }
      50% { transform: scale(.90); opacity: .72; }
    }

    .arrowWrap {
      width: 86px;
      height: 86px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 2;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.16);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 14px 28px rgba(0,0,0,.24);
      transition: transform 180ms ease;
      will-change: transform;
    }

    .arrowSvg {
      width: 52px;
      height: 52px;
      transform-origin: 50% 50%;
      transform: rotate(0deg);
      transition: transform 220ms cubic-bezier(.2,.8,.2,1);
      filter: drop-shadow(0 0 10px rgba(255,255,255,.10));
    }

    #distance {
      min-width: 120px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      font-size: 18px;
      backdrop-filter: blur(18px);
    }

    #sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.35px;
      text-transform: uppercase;
    }

    #bottom {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .chip {
      flex: 1;
      min-width: 0;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      backdrop-filter: blur(18px);
    }

    #hint {
      position: absolute;
      left: 50%;
      bottom: 118px;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--line);
      color: rgba(255,255,255,0.74);
      font-size: 12px;
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
      text-align: center;
      max-width: calc(100vw - 32px);
    }

    #hint.show {
      opacity: 1;
    }

    #micState {
      position: absolute;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.78);
      font-size: 12px;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    #micState.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="micState">Tallennus käynnissä…</div>

    <div id="top">
      <input id="dest" placeholder="Kirjoita kohde, esim. Kamppi Helsinki" />
      <button class="btn" id="go">Aloita</button>
      <button class="btn" id="mic">Mikki</button>
      <button class="btn" id="stop">Lopeta</button>
    </div>

    <div id="center">
      <div class="ring">
        <div class="arrowWrap" id="arrowWrap">
          <svg class="arrowSvg" id="arrowSvg" viewBox="0 0 100 100" aria-hidden="true">
            <path d="M50 14 L50 70" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
            <path d="M28 36 L50 14 L72 36" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div id="distance">—</div>
      <div id="sub">Valmis</div>
    </div>

    <div id="hint">Sano: “Vie Kamppiin”, “Vie lähimpään ruokakauppaan”, “Lopeta”, “Missä olen”, “Kuinka pitkä matka”</div>

    <div id="bottom">
      <div class="chip" id="gps">Sijainti: pois</div>
      <div class="chip" id="compass">Kompassi: pois</div>
      <div class="chip" id="mode">Tila: Valmis</div>
    </div>
  </div>

  <script>
    const center = document.getElementById('center');
    const arrowSvg = document.getElementById('arrowSvg');
    const arrowWrap = document.getElementById('arrowWrap');
    const distanceEl = document.getElementById('distance');
    const sub = document.getElementById('sub');
    const gps = document.getElementById('gps');
    const compass = document.getElementById('compass');
    const mode = document.getElementById('mode');
    const hint = document.getElementById('hint');
    const dest = document.getElementById('dest');
    const goBtn = document.getElementById('go');
    const micBtn = document.getElementById('mic');
    const stopBtn = document.getElementById('stop');
    const micState = document.getElementById('micState');

    const state = {
      current: null,
      target: null,
      targetLabel: '',
      watchId: null,
      heading: null,
      lastVibeAt: 0,
      listening: false,
      recording: false,
      recorder: null,
      stream: null,
      chunks: [],
      compassEnabled: false,
      route: null,
      activeStepIndex: 0,
      lastRouteAt: 0,
      routeLoading: false
    };

    function showHint(text) {
      hint.textContent = text;
      hint.classList.add('show');
      clearTimeout(showHint.t);
      showHint.t = setTimeout(() => hint.classList.remove('show'), 2200);
    }

    function setMode(text) {
      mode.textContent = `Tila: ${text}`;
    }

    function toRad(v) { return v * Math.PI / 180; }
    function toDeg(v) { return v * 180 / Math.PI; }

    function haversine(a, b) {
      const R = 6371000;
      const dLat = toRad(b.lat - a.lat);
      const dLon = toRad(b.lng - a.lng);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(x));
    }

    function bearing(from, to) {
      const φ1 = toRad(from.lat), φ2 = toRad(to.lat);
      const λ1 = toRad(from.lng), λ2 = toRad(to.lng);
      const y = Math.sin(λ2 - λ1) * Math.cos(φ2);
      const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(λ2 - λ1);
      return (toDeg(Math.atan2(y, x)) + 360) % 360;
    }

    function diffAngle(a, b) {
      let d = ((a - b) % 360 + 360) % 360;
      if (d > 180) d -= 360;
      return d;
    }

    function formatDistance(m) {
      if (m == null || Number.isNaN(m)) return '—';
      if (m < 1000) return `${Math.round(m)} m`;
      return `${(m / 1000).toFixed(m < 10000 ? 1 : 0)} km`;
    }

    function arrowRotationFromDiff(d) {
      if (Math.abs(d) < 10) return 0;
      if (d >= 10 && d < 40) return 30;
      if (d >= 40 && d < 85) return 90;
      if (d >= 85 && d < 140) return 135;
      if (d >= 140) return 180;
      if (d <= -10 && d > -40) return -30;
      if (d <= -40 && d > -85) return -90;
      if (d <= -85 && d > -140) return -135;
      if (d <= -140) return 180;
      return 0;
    }

    function getBestFinnishVoice() {
      try {
        const voices = speechSynthesis.getVoices();
        return voices.find(v => /^fi\b/i.test(v.lang)) ||
               voices.find(v => /finn/i.test(v.name)) ||
               voices.find(v => /siri/i.test(v.name)) ||
               null;
      } catch {
        return null;
      }
    }

    function speakFi(text) {
      const clean = String(text || '').trim();
      if (!clean || !('speechSynthesis' in window)) return;

      try {
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(clean);
        u.lang = 'fi-FI';
        u.rate = 0.96;
        u.pitch = 1.0;
        u.volume = 1.0;
        const voice = getBestFinnishVoice();
        if (voice) u.voice = voice;
        speechSynthesis.speak(u);
      } catch {}
    }

    if ('speechSynthesis' in window) {
      speechSynthesis.onvoiceschanged = () => {};
    }

    function extractJson(text) {
      const raw = String(text || '').trim();
      const cleaned = raw.replace(/^```(?:json)?/i, '').replace(/```$/i, '').trim();
      const start = cleaned.indexOf('{');
      const end = cleaned.lastIndexOf('}');
      if (start === -1 || end === -1 || end <= start) return null;
      try {
        return JSON.parse(cleaned.slice(start, end + 1));
      } catch {
        return null;
      }
    }

    function normalizeText(t) {
      return String(t || '').toLowerCase().replace(/[.,!?]/g, ' ').replace(/\s+/g, ' ').trim();
    }

    async function geocodePlace(query, searchMode = 'exact') {
      const q = String(query || '').trim();
      if (!q) throw new Error('Tyhjä kohde');

      const params = new URLSearchParams({
        format: 'jsonv2',
        q,
        limit: '1',
        addressdetails: '1',
        'accept-language': 'fi'
      });

      if (searchMode === 'nearby' && state.current) {
        const lat = state.current.lat;
        const lng = state.current.lng;
        const dLat = 0.10;
        const dLng = 0.15;
        params.set('viewbox', `${lng - dLng},${lat + dLat},${lng + dLng},${lat - dLat}`);
        params.set('bounded', '1');
      } else if (!/finland|suomi|helsinki|espoo|vantaa|tampere|turku|oulu|jyväskylä|rovaniemi/i.test(q)) {
        params.set('q', `${q}, Finland`);
      }

      const res = await fetch(`https://nominatim.openstreetmap.org/search?${params.toString()}`, {
        headers: { 'Accept': 'application/json' }
      });

      const data = await res.json();
      if (Array.isArray(data) && data.length) {
        return {
          lat: parseFloat(data[0].lat),
          lng: parseFloat(data[0].lon),
          label: data[0].display_name || q
        };
      }

      throw new Error('Paikkaa ei löytynyt');
    }

    async function getRoute(from, to) {
      const url = `https://router.project-osrm.org/route/v1/foot/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson&steps=true`;
      const res = await fetch(url);
      const data = await res.json();
      if (!data.routes || !data.routes.length) throw new Error('Reittiä ei löytynyt');
      return data.routes[0];
    }

    function extractSteps(route) {
      const steps = [];
      for (const leg of route.legs || []) {
        for (const step of leg.steps || []) steps.push(step);
      }
      return steps;
    }

    function stepLocation(step, fallback) {
      const loc = step?.maneuver?.location;
      if (Array.isArray(loc) && loc.length >= 2) {
        return { lat: loc[1], lng: loc[0] };
      }
      return fallback;
    }

    function currentStep() {
      if (!state.route?.steps?.length) return null;
      return state.route.steps[Math.min(state.activeStepIndex, state.route.steps.length - 1)];
    }

    function advanceStepIfClose() {
      const step = currentStep();
      if (!step || !state.current) return;

      const p = stepLocation(step, state.target);
      const d = haversine(state.current, p);

      if (d < 28 && state.activeStepIndex < state.route.steps.length - 1) {
        state.activeStepIndex += 1;
        if (navigator.vibrate) navigator.vibrate(30);
      }
    }

    async function maybeReroute() {
      if (!state.route || !state.current || !state.target || state.routeLoading) return;
      if (Date.now() - state.lastRouteAt < 18000) return;

      const step = currentStep();
      const p = stepLocation(step, state.target);
      const dStep = haversine(state.current, p);

      if (dStep > 180) {
        state.routeLoading = true;
        try {
          await buildRoute();
          showHint('Uusi reitti haettu');
          speakFi('Haen uuden reitin.');
        } catch (e) {
          console.error(e);
        } finally {
          state.routeLoading = false;
        }
      }
    }

    async function buildRoute() {
      if (!state.current || !state.target) return;
      state.lastRouteAt = Date.now();
      const route = await getRoute(state.current, state.target);
      state.route = {
        geometry: route.geometry,
        steps: extractSteps(route)
      };
      state.activeStepIndex = 0;
    }

    async function enableCompass() {
      try {
        if (state.compassEnabled) return true;

        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
          const permission = await DeviceOrientationEvent.requestPermission();
          if (permission !== 'granted') {
            compass.textContent = 'Kompassi: kieltty';
            return false;
          }
        }

        window.addEventListener('deviceorientation', (e) => {
          if (typeof e.webkitCompassHeading === 'number') {
            state.heading = e.webkitCompassHeading;
          } else if (e.alpha != null) {
            state.heading = 360 - e.alpha;
          }
        }, true);

        state.compassEnabled = true;
        compass.textContent = 'Kompassi: päällä';
        return true;
      } catch {
        compass.textContent = 'Kompassi: pois';
        return false;
      }
    }

    async function ensureCurrentPosition(timeoutMs = 8000) {
      if (state.current) return state.current;

      if (!navigator.geolocation) throw new Error('Sijaintia ei tueta');

      return await new Promise((resolve, reject) => {
        const t = setTimeout(() => reject(new Error('Sijainti ei löytynyt ajoissa')), timeoutMs);
        navigator.geolocation.getCurrentPosition((pos) => {
          clearTimeout(t);
          state.current = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            accuracy: pos.coords.accuracy
          };
          resolve(state.current);
        }, (err) => {
          clearTimeout(t);
          reject(err);
        }, {
          enableHighAccuracy: true,
          timeout: timeoutMs,
          maximumAge: 0
        });
      });
    }

    async function startLocationWatch() {
      if (!navigator.geolocation) throw new Error('Sijaintia ei tueta');

      if (state.watchId) navigator.geolocation.clearWatch(state.watchId);

      state.watchId = navigator.geolocation.watchPosition(async (pos) => {
        state.current = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy
        };
        gps.textContent = 'Sijainti: päällä';
        updateHUD();
        await maybeReroute();
      }, () => {}, {
        enableHighAccuracy: true,
        maximumAge: 1000,
        timeout: 10000
      });
    }

    function updateHUD() {
      if (!state.current) return;

      const targetPoint = state.route?.steps?.length
        ? stepLocation(currentStep(), state.target)
        : state.target;

      if (!targetPoint) return;

      const dTarget = haversine(state.current, state.target || targetPoint);
      const dStep = haversine(state.current, targetPoint);
      const b = bearing(state.current, targetPoint);
      const h = state.heading;
      const diff = h == null ? 0 : diffAngle(b, h);
      const rot = arrowRotationFromDiff(diff);

      arrowSvg.style.transform = `rotate(${rot}deg)`;

      if (dTarget < 20) {
        distanceEl.textContent = 'NYT';
        sub.textContent = 'Perillä pian';
      } else {
        distanceEl.textContent = formatDistance(dStep);
        const step = currentStep();
        sub.textContent = step?.maneuver?.instruction || (Math.abs(diff) < 20 ? 'Oikea suunta' : 'Käänny');
      }

      gps.textContent = 'Sijainti: päällä';
      compass.textContent = state.compassEnabled ? 'Kompassi: päällä' : 'Kompassi: pois';
      setMode(state.listening ? 'Kuuntelen' : (state.target ? 'Navigointi' : 'Valmis'));

      const show = state.listening || state.target || dTarget < 120 || Math.abs(diff) > 18;
      center.classList.toggle('show', !!show);

      if (dTarget < 20 && Date.now() - state.lastVibeAt > 1200) {
        if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
        state.lastVibeAt = Date.now();
      }

      arrowWrap.style.transform = dTarget < 20 ? 'scale(1.06)' : 'scale(1)';
    }

    async function startNavigationFromQuery(query, searchMode = 'exact') {
      const q = String(query || '').trim();
      if (!q) {
        showHint('Kirjoita kohde ensin');
        speakFi('Kirjoita kohde ensin');
        return;
      }

      await enableCompass();
      await ensureCurrentPosition();
      await startLocationWatch();

      setMode('Haetaan');
      showHint(`Haetaan: ${q}`);
      speakFi(`Haetaan kohde ${q}.`);

      try {
        const target = await geocodePlace(q, searchMode);
        state.target = target;
        state.targetLabel = target.label || q;
        await buildRoute();
        setMode('Navigointi');
        showHint(`Kohde löytyi`);
        speakFi(`Aloitetaan navigointi kohteeseen ${q}.`);
        updateHUD();
      } catch (e) {
        console.error(e);
        state.target = null;
        state.targetLabel = '';
        setMode('Valmis');
        showHint('Paikkaa ei löytynyt');
        speakFi('En löytänyt paikkaa. Sano esimerkiksi Kamppi Helsinki tai lähin ruokakauppa.');
      }
    }

    function stopNavigation() {
      if (state.watchId) {
        navigator.geolocation.clearWatch(state.watchId);
        state.watchId = null;
      }

      state.target = null;
      state.targetLabel = '';
      state.route = null;
      state.activeStepIndex = 0;
      state.listening = false;
      state.recording = false;
      gps.textContent = 'Sijainti: pois';
      compass.textContent = state.compassEnabled ? 'Kompassi: päällä' : 'Kompassi: pois';
      setMode('Valmis');
      center.classList.remove('show');
      showHint('Pysäytetty');
    }

    async function askAI(text) {
      const payload = {
        text,
        currentLocation: state.current ? { lat: state.current.lat, lng: state.current.lng, accuracy: state.current.accuracy || null } : null,
        activeTarget: state.targetLabel || null
      };

      const res = await fetch('/api/ai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'AI-virhe');
      return data;
    }

    async function handleTranscript(text) {
      const transcript = String(text || '').trim();
      if (!transcript) {
        speakFi('En kuullut mitään.');
        return;
      }

      showHint(transcript);

      try {
        const ai = await askAI(transcript);

        if (ai.should_stop_navigation || ai.intent === 'stop') {
          stopNavigation();
          speakFi(ai.reply || 'Navigointi pysäytetty.');
          return;
        }

        if (ai.intent === 'whereami') {
          if (!state.current) {
            speakFi('Sijaintia ei vielä ole.');
          } else {
            speakFi(`Sijaintisi tarkkuus on noin ${Math.round(state.current.accuracy || 0)} metriä.`);
          }
          return;
        }

        if (ai.intent === 'status') {
          if (!state.current || !state.target) {
            speakFi('Aktiivista navigointia ei ole käynnissä.');
          } else {
            const d = haversine(state.current, state.target);
            speakFi(d < 20 ? 'Olet perillä.' : `Matkaa on noin ${formatDistance(d)}.`);
          }
          return;
        }

        if (ai.intent === 'help') {
          speakFi(ai.reply || 'Voit sanoa: vie Kamppiin, vie lähimpään ruokakauppaan, lopeta, missä olen tai kuinka pitkä matka.');
          return;
        }

        if (ai.intent === 'clarify') {
          speakFi(ai.reply || 'Minne haluat mennä?');
          return;
        }

        if (ai.intent === 'navigate') {
          speakFi(ai.reply || 'Selvä.');
          if (ai.destination_query) {
            dest.value = ai.destination_query;
            await startNavigationFromQuery(ai.destination_query, ai.search_mode || 'exact');
          } else {
            speakFi('En saanut kohdetta varmuudella selville.');
          }
          return;
        }

        speakFi(ai.reply || 'Valmis.');
      } catch (e) {
        console.error(e);
        showHint('AI-virhe');
        speakFi('Tapahtui virhe. Yritä uudestaan.');
      }
    }

    async function blobToBase64(blob) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => {
          const result = String(reader.result || '');
          const base64 = result.includes(',') ? result.split(',')[1] : result;
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function transcribeAudioBlob(blob, mimeType) {
      const audioBase64 = await blobToBase64(blob);
      const res = await fetch('/api/transcribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          audioBase64,
          mimeType: mimeType || blob.type || 'audio/webm'
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Transkriptio epäonnistui');
      return data.text || '';
    }

    async function startRecording() {
      if (state.recording) return;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        state.stream = stream;

        const preferredTypes = [
          'audio/webm;codecs=opus',
          'audio/webm',
          'audio/mp4'
        ];

        const mimeType = preferredTypes.find(t => window.MediaRecorder && MediaRecorder.isTypeSupported(t)) || '';
        const options = mimeType ? { mimeType } : undefined;

        const recorder = new MediaRecorder(stream, options);
        state.recorder = recorder;
        state.chunks = [];
        state.recording = true;
        state.listening = true;

        micBtn.textContent = 'Puhu';
        micState.classList.add('show');
        setMode('Kuuntelen');
        showHint('Puhu nyt');
        speakFi('Kuuntelen.');

        recorder.ondataavailable = (e) => {
          if (e.data && e.data.size > 0) state.chunks.push(e.data);
        };

        recorder.onstop = async () => {
          try {
            const blob = new Blob(state.chunks, { type: mimeType || 'audio/webm' });
            const transcript = await transcribeAudioBlob(blob, mimeType || blob.type);
            await handleTranscript(transcript);
          } catch (e) {
            console.error(e);
            showHint('Puhe ei onnistunut');
            speakFi('Puheentunnistus epäonnistui.');
          } finally {
            state.recording = false;
            state.listening = false;
            micBtn.textContent = 'Mikki';
            micState.classList.remove('show');
            if (state.stream) {
              state.stream.getTracks().forEach(t => t.stop());
              state.stream = null;
            }
            state.recorder = null;
            updateHUD();
          }
        };

        recorder.start();

        clearTimeout(state.recordTimer);
        state.recordTimer = setTimeout(() => stopRecording(), 6000);
      } catch (e) {
        console.error(e);
        state.recording = false;
        micState.classList.remove('show');
        showHint('Mikrofoni ei auennut');
        speakFi('Mikrofoni ei auennut.');
      }
    }

    function stopRecording() {
      clearTimeout(state.recordTimer);
      if (!state.recording) return;
      try {
        if (state.recorder && state.recorder.state !== 'inactive') {
          state.recorder.stop();
        }
      } catch {}
    }

    goBtn.onclick = () => {
      startNavigationFromQuery(dest.value, 'exact').catch(err => {
        console.error(err);
        showHint('Virhe');
        speakFi('Virhe tapahtui.');
      });
    };

    micBtn.onclick = () => {
      if (state.recording) {
        stopRecording();
      } else {
        startRecording();
      }
    };

    stopBtn.onclick = () => {
      stopRecording();
      stopNavigation();
      speakFi('Navigointi pysäytetty.');
    };

    dest.value = 'Kamppi Helsinki';
    setMode('Valmis');
    showHint('Sano esimerkiksi: “Vie Kamppiin”');

    document.body.addEventListener('click', () => {
      enableCompass();
    }, { once: true });
  </script>
</body>
</html>
