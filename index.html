<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Halo AI Ultra</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/script.js" defer></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places,geometry&callback=initMap" async defer></script>
</head>
<body>
  <div id="app">
    <div id="map"></div>
    <div id="scrim"></div>

    <div id="micState">Kuuntelen…</div>

    <div id="topBar">
      <div id="search" class="glass">
        <input id="dest" placeholder="Kirjoita kohde, esim. Kamppi Helsinki" />
      </div>
      <button class="btn" id="goBtn">Aloita</button>
      <button class="btn" id="micBtn">Mikki</button>
      <button class="btn" id="stopBtn">Lopeta</button>
    </div>

    <div id="hint">Sano: “Vie Kamppiin”, “Vie lähimpään ruokakauppaan”, “Lopeta”, “Missä olen”, “Kuinka pitkä matka”</div>

    <div id="center">
      <div class="ring">
        <div class="arrowWrap" id="arrowWrap">
          <svg class="arrowSvg" id="arrowSvg" viewBox="0 0 100 100" aria-hidden="true">
            <path d="M50 14 L50 70" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"></path>
            <path d="M28 36 L50 14 L72 36" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
      </div>
      <div id="distance">—</div>
      <div id="sub">Valmis</div>
    </div>

    <div id="bottom">
      <div id="chips">
        <div class="chip" id="gpsChip">Sijainti: pois</div>
        <div class="chip" id="compassChip">Kompassi: pois</div>
        <div class="chip" id="modeChip">Tila: Valmis</div>
      </div>
      <div id="progress"><div id="bar"></div></div>
      <div id="legend">
        <div>Swipe vasen/oikea: HUD / Kartta</div>
        <div>Puhe: suomi</div>
        <div>GPS + Places + Directions</div>
      </div>
    </div>
  </div>
</body>
</html>
